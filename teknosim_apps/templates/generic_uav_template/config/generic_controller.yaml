controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    uav_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

uav_velocity_controller:
  ros__parameters:
    joints:
      - motor1_joint
      - motor2_joint
      - motor3_joint
      - motor4_joint
